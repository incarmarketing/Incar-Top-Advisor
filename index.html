<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>ITA Awards New Zealand</title>
    
    <!-- ▼▼▼ [썸네일 설정] ▼▼▼ -->
    <meta property="og:title" content="2026 ITA Conference">
    <meta property="og:description" content="2026. 04. 10(Fri) - 16(Thu)">
    <meta property="og:image" content="https://raw.githubusercontent.com/incarmarketing/Incar-Top-Advisor/main/stamp.png">
    
    <!-- 폰트 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nanum+Myeongjo:wght@400;700;800&display=swap" rel="stylesheet">

    <!-- CDN 라이브러리 -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        body { font-family: 'Nanum Myeongjo', serif; -webkit-tap-highlight-color: transparent; background-color: #020617; overflow-x: hidden; }

        /* [애니메이션] */
        .fade-enter { animation: fadeIn 2.0s ease-in-out forwards; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        
        .animate-in { animation: slideUpFade 0.8s ease-out forwards; }
        @keyframes slideUpFade { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }

        /* [로고 마스킹] */
        .gold-logo-mask {
            width: 100%; height: 100%;
            background: linear-gradient(110deg, #aa771c 10%, #bf953f 30%, #fcf6ba 45%, #fcf6ba 55%, #bf953f 70%, #aa771c 90%);
            background-size: 200% 100%;
            -webkit-mask-image: url('https://raw.githubusercontent.com/incarmarketing/Incar-Top-Advisor/main/ITA.png');
            mask-image: url('https://raw.githubusercontent.com/incarmarketing/Incar-Top-Advisor/main/ITA.png');
            -webkit-mask-size: contain; mask-size: contain;
            -webkit-mask-repeat: no-repeat; mask-repeat: no-repeat;
            -webkit-mask-position: center; mask-position: center;
            animation: shimmerLoop 6s linear infinite;
        }
        @keyframes shimmerLoop { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }

        /* [봉투 컨테이너] */
        .envelope-container { 
            perspective: 1500px; 
            cursor: pointer; 
            display: flex; 
            justify-content: center; 
            align-items: center;
            width: 350px; 
            height: 220px; 
            transition: transform 1s cubic-bezier(0.34, 1.56, 0.64, 1);
            position: relative;
            z-index: 20; 
            pointer-events: auto !important;
        }
        
        .envelope-container.opened { transform: translateY(50px); cursor: default; }
        
        .envelope {
            position: relative; width: 100%; height: 100%;
            background-color: #fcfbf9; 
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            border-radius: 4px; z-index: 10; transform-style: preserve-3d;
            box-shadow: 0 35px 70px -12px rgba(0, 0, 0, 0.6), 0 5px 15px rgba(0,0,0,0.1);
        }

        .letter-paper {
            position: absolute; 
            bottom: 0; left: 50%; transform: translateX(-50%); 
            width: 320px; 
            height: 180px; 
            background: #ffffff; 
            padding: 30px 24px 24px 24px; 
            transition: height 0.8s cubic-bezier(0.25, 1, 0.5, 1) 0.6s, bottom 0.8s cubic-bezier(0.25, 1, 0.5, 1) 0.6s, z-index 0s 0.6s;
            z-index: 5; 
            box-shadow: none; 
            display: flex; flex-direction: column;
            border-radius: 2px 2px 0 0; 
            overflow: hidden;
            pointer-events: none; 
        }
        
        .letter-paper::after {
            content: ''; position: absolute; inset: 12px;
            border: 1px solid #D4AF37;
            outline: 1px solid #D4AF37;
            outline-offset: -4px;
            pointer-events: none;
            background-image: 
                radial-gradient(circle at top left, transparent 8px, #D4AF37 8.5px, #D4AF37 9.5px, transparent 10px),
                radial-gradient(circle at top right, transparent 8px, #D4AF37 8.5px, #D4AF37 9.5px, transparent 10px),
                radial-gradient(circle at bottom left, transparent 8px, #D4AF37 8.5px, #D4AF37 9.5px, transparent 10px),
                radial-gradient(circle at bottom right, transparent 8px, #D4AF37 8.5px, #D4AF37 9.5px, transparent 10px);
            background-size: 20px 20px;
            background-repeat: no-repeat;
            background-position: top left, top right, bottom left, bottom right;
            z-index: 60; 
        }
        
        .envelope.open .letter-paper {
            height: 580px; 
            bottom: -60px; 
            z-index: 50; 
            box-shadow: 0 10px 40px rgba(0,0,0,0.25); 
            overflow: visible; 
            pointer-events: auto; 
        }

        .letter-content-flex {
            display: flex; flex-direction: column; height: 100%;
            justify-content: space-between; align-items: center; width: 100%;
            position: relative; z-index: 70;
        }

        .envelope::before { 
            content: ''; position: absolute; inset: 0; 
            background-color: #1e293b; border-radius: 4px; z-index: 1; 
            border: 1px solid rgba(212, 175, 55, 0.3); 
        }
        
        .flap { 
            position: absolute; inset: 0; pointer-events: none; 
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
        }
        .flap-left { z-index: 10; background-color: #fcfbf9; background-blend-mode: multiply; clip-path: polygon(0 0, 55% 50%, 0 100%); filter: drop-shadow(1px 0 2px rgba(0,0,0,0.15)); }
        .flap-right { z-index: 10; background-color: #f8f6f2; background-blend-mode: multiply; clip-path: polygon(100% 0, 45% 50%, 100% 100%); filter: drop-shadow(-1px 0 2px rgba(0,0,0,0.15)); }
        .flap-bottom { z-index: 11; clip-path: polygon(0 100%, 50% 50%, 100% 100%); background-color: #fcfbf9; background-blend-mode: multiply; background: linear-gradient(to top, #e2e2e2 0%, #fcfbf9 100%); filter: drop-shadow(0 -3px 5px rgba(0,0,0,0.1)); }
        
        .envelope-lid {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 12;
            background-color: #fcfbf9; background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.8' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
            background-blend-mode: multiply; clip-path: polygon(0 0, 100% 0, 50% 55%);
            transform-origin: top; transition: transform 0.6s cubic-bezier(0.4, 0, 0.2, 1), z-index 0.6s step-end; filter: drop-shadow(0 3px 5px rgba(0,0,0,0.15));
        }
        .envelope.open .envelope-lid { transform: rotateX(180deg); z-index: 1; background: #1e293b; background-image: none; }
        
        .wax-seal-wrapper { position: absolute; top: 55%; left: 50%; transform: translate(-50%, -50%); width: 180px; height: 180px; z-index: 15; cursor: pointer; transition: all 0.4s ease; filter: drop-shadow(0 8px 12px rgba(0,0,0,0.4)); }
        .wax-seal-img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .envelope-container:hover .wax-seal-wrapper { transform: translate(-50%, -50%) scale(1.05) rotate(5deg); }
        .envelope.open .wax-seal-wrapper { opacity: 0; transform: translate(-50%, -50%) scale(1.5); pointer-events: none; }
        
        .tap-hint { position: absolute; bottom: -60px; width: 100%; text-align: center; color: rgba(255,255,255,0.4); font-size: 0.75rem; letter-spacing: 0.2em; text-transform: uppercase; animation: bounce 2s infinite; font-weight: 500; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }

        .btn-enter {
            position: relative; background: rgba(0, 0, 0, 0.3); backdrop-filter: blur(4px);
            border: 1px solid rgba(212, 175, 55, 0.6); border-radius: 4px;
            color: #D4AF37; font-family: 'Playfair Display', serif; 
            font-size: 1.5rem; font-weight: 700; letter-spacing: 0.3em;
            padding: 12px 40px; cursor: pointer; transition: all 0.5s;
            box-shadow: 0 0 15px rgba(0, 0, 0, 0.5); text-shadow: 0 2px 4px rgba(0,0,0,0.8);
            margin-top: 30px; z-index: 50;
        }
        .btn-enter:hover { 
            background: rgba(212, 175, 55, 0.1); border-color: #D4AF37; color: #fff; 
            box-shadow: 0 0 25px rgba(212, 175, 55, 0.4);
        }
        .btn-enter::before {
            content: ''; position: absolute; inset: -3px; 
            border: 1px solid rgba(212, 175, 55, 0.2); border-radius: 6px;
            animation: pulseBorder 2s infinite;
        }
        @keyframes pulseBorder { 0% { transform: scale(1); opacity: 0.5; } 100% { transform: scale(1.05); opacity: 0; } }
        
        .loader {
            border: 3px solid rgba(255, 255, 255, 0.3); border-radius: 50%;
            border-top: 3px solid #D4AF37; width: 20px; height: 20px;
            animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* 스크롤바 감추기 (입력 필드용) */
        input[type="number"]::-webkit-outer-spin-button,
        input[type="number"]::-webkit-inner-spin-button { -webkit-appearance: none; margin: 0; }
        input[type="number"] { -moz-appearance: textfield; }

        /* 슬라이드 메뉴 애니메이션 */
        .sidebar-enter { transform: translateX(100%); }
        .sidebar-enter-active { transform: translateX(0); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1); }
        .sidebar-exit { transform: translateX(0); }
        .sidebar-exit-active { transform: translateX(100%); transition: transform 0.3s ease-in; }
    </style>
</head>
<body class="bg-[#020617]">
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const GOOGLE_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbz4gHGlLUSwikjL09bnx7VTtbgrO5OVtdljzPLKmQlMD9Jf5uNJRpLCkjWkyLeRWtMf/exec"; 

        // --- 아이콘 컴포넌트 (렌더링 에러 해결) ---
        const LucideIcon = ({ name, size = 16, className = "", ...props }) => {
            const spanRef = useRef(null);
            
            useEffect(() => {
                if (spanRef.current && window.lucide) {
                    spanRef.current.innerHTML = `<i data-lucide="${name}"></i>`;
                    window.lucide.createIcons({ root: spanRef.current });
                    const svg = spanRef.current.querySelector('svg');
                    if (svg) {
                        svg.style.width = typeof size === 'number' ? `${size}px` : size;
                        svg.style.height = typeof size === 'number' ? `${size}px` : size;
                    }
                }
            }, [name, size]);

            return <span ref={spanRef} className={`inline-flex items-center justify-center ${className}`} {...props}></span>;
        };

        const Plane = (p) => <LucideIcon name="plane" {...p} />;
        const Hotel = (p) => <LucideIcon name="hotel" {...p} />;
        const MapPin = (p) => <LucideIcon name="map-pin" {...p} />;
        const Phone = (p) => <LucideIcon name="phone" {...p} />;
        const Calendar = (p) => <LucideIcon name="calendar" {...p} />;
        const ChevronRight = (p) => <LucideIcon name="chevron-right" {...p} />;
        const ChevronDown = (p) => <LucideIcon name="chevron-down" {...p} />;
        const X = (p) => <LucideIcon name="x" {...p} />;
        const Coffee = (p) => <LucideIcon name="coffee" {...p} />;
        const Utensils = (p) => <LucideIcon name="utensils" {...p} />;
        const Camera = (p) => <LucideIcon name="camera" {...p} />;
        const Wine = (p) => <LucideIcon name="wine" {...p} />;
        const Ship = (p) => <LucideIcon name="ship" {...p} />;
        const Award = (p) => <LucideIcon name="award" {...p} />;
        const Sun = (p) => <LucideIcon name="sun" {...p} />;
        const UtensilsCrossed = (p) => <LucideIcon name="utensils-crossed" {...p} />;
        const BedDouble = (p) => <LucideIcon name="bed-double" {...p} />;
        const Mountain = (p) => <LucideIcon name="mountain" {...p} />;
        const Info = (p) => <LucideIcon name="info" {...p} />;

        const Calculator = (p) => <LucideIcon name="calculator" {...p} />;
        const ArrowRightLeft = (p) => <LucideIcon name="arrow-right-left" {...p} />;
        const Globe = (p) => <LucideIcon name="globe" {...p} />;
        const MessageSquare = (p) => <LucideIcon name="message-square" {...p} />;
        const Cloud = (p) => <LucideIcon name="cloud" {...p} />;
        const CloudSun = (p) => <LucideIcon name="cloud-sun" {...p} />;
        const CloudRain = (p) => <LucideIcon name="cloud-rain" {...p} />;
        const Snowflake = (p) => <LucideIcon name="snowflake" {...p} />;

        // 날씨 코드를 아이콘으로 변환하는 헬퍼 함수
        const getWeatherIcon = (code, size = 24) => {
            if (code === 0) return <Sun size={size} className="text-amber-400" />;
            if (code >= 1 && code <= 3) return <CloudSun size={size} className="text-slate-300" />;
            if (code >= 45 && code <= 48) return <Cloud size={size} className="text-slate-400" />;
            if ((code >= 51 && code <= 67) || (code >= 80 && code <= 82) || (code >= 95)) return <CloudRain size={size} className="text-blue-400" />;
            if (code >= 71 && code <= 86) return <Snowflake size={size} className="text-cyan-300" />;
            return <Cloud size={size} className="text-slate-400" />;
        };

            { id: 'TravelInfo', label: '여행정보', icon: Info }, 
            { id: 'Schedule', label: '일정', icon: Calendar },
            { id: 'Hotel', label: '숙소', icon: BedDouble },
            { id: 'Dining', label: '식사', icon: UtensilsCrossed },
            { id: 'Attractions', label: '관광', icon: Mountain }
          ];
          return (
            <div className="sticky top-0 z-40 bg-[#f8fafc]/95 backdrop-blur-md border-b border-slate-200 overflow-x-auto no-scrollbar">
              <div className="flex justify-between min-w-[360px] max-w-md sm:max-w-4xl mx-auto px-1">
                {tabs.map((tab) => {
                  const Icon = tab.icon;
                  const isActive = activeTab === tab.id;
                  return (
                    <button key={tab.id} onClick={() => setActiveTab(tab.id)} className={`flex-1 flex flex-col items-center justify-center py-3 px-1 text-xs transition-all relative text-slate-600 hover:text-slate-800 ${isActive ? "font-bold" : "font-medium"}`}>
                      <Icon size={18} className="mb-1" />
                      {tab.label}
                      {isActive && <div className="absolute bottom-0 w-full h-0.5 bg-amber-600 rounded-t-full"></div>}
                    </button>
                  )
                })}
              </div>
            </div>
          );
        };

        // --- [신규 컴포넌트] 아코디언 UI 항목 ---
        const AccordionItem = ({ title, icon: Icon, isOpen, onToggle, children }) => {
            return (
                <div className="bg-white rounded-2xl shadow-sm border border-slate-200 overflow-hidden mb-4">
                    <button
                        onClick={onToggle}
                        className="w-full flex items-center justify-between p-4 bg-white hover:bg-slate-50 transition-colors"
                    >
                        <div className="flex items-center">
                            <div className="w-8 h-8 rounded-full bg-slate-100 flex items-center justify-center mr-3">
                                <Icon size={16} className="text-amber-600" />
                            </div>
                            <span className="font-bold text-slate-800 text-[15px]">{title}</span>
                        </div>
                        <div className={`transform transition-transform duration-300 ${isOpen ? 'rotate-180' : ''}`}>
                            <ChevronDown size={20} className="text-slate-400" />
                        </div>
                    </button>
                    <div className={`grid transition-all duration-300 ease-in-out ${isOpen ? 'grid-rows-[1fr] opacity-100' : 'grid-rows-[0fr] opacity-0'}`}>
                        <div className="overflow-hidden">
                            <div className="p-4 border-t border-slate-100 bg-slate-50/50">
                                {children}
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- [수정된 컴포넌트] 여행 정보 통합 View ---
        const TravelInfoView = () => {
            const [openSection, setOpenSection] = useState('arrival'); // 기본값: 입국 시 주의사항 열림

            const toggleSection = (section) => {
                setOpenSection(prev => prev === section ? null : section);
            };

            return (
                <div className="animate-in fade-in slide-in-from-right-4 duration-500 pb-10">
                    <h2 className="text-xl font-bold text-slate-900 mb-6 flex items-center font-[Playfair Display]">
                        <Info className="mr-2 text-amber-600" /> Travel Information
                    </h2>

                    {/* 1. 입국 시 안내 */}
                    <AccordionItem 
                        title="입국 시 주의사항" 
                        icon={Plane} 
                        isOpen={openSection === 'arrival'} 
                        onToggle={() => toggleSection('arrival')}
                    >
                        <div className="mb-4 bg-red-50 border border-red-200 rounded-xl p-4 flex items-start shadow-sm">
                            <AlertTriangle size={24} className="text-red-600 mr-3 shrink-0 mt-0.5" />
                            <div className="text-sm text-red-800 leading-snug font-bold">
                                <p className="mb-1">뉴질랜드는 음식물 반입 검사가 매우 까다롭습니다.</p>
                                <p className="text-red-600 underline decoration-red-400 underline-offset-2">가방 속 과일 한 조각으로도 큰 벌금이 부과되니 절대 소지하지 마세요.</p>
                            </div>
                        </div>
                        <div className="space-y-4">
                            {travelData.entryInfo.map((info, idx) => (
                                <div key={idx} className="border-b border-slate-200/60 last:border-0 pb-4 last:pb-0">
                                    <h4 className="font-bold text-slate-800 mb-1.5 flex items-center text-sm"><CheckCircle size={14} className="mr-2 text-green-600" />{info.title}</h4>
                                    <p className="text-sm text-slate-600 leading-relaxed pl-6">{info.content}</p>
                                </div>
                            ))}
                        </div>
                    </AccordionItem>

                    {/* 2. 출국 시 안내 */}
                    <AccordionItem 
                        title="출국 시 안내사항" 
                        icon={Plane} 
                        isOpen={openSection === 'departure'} 
                        onToggle={() => toggleSection('departure')}
                    >
                        <div className="space-y-4">
                            {travelData.departureInfo.map((info, idx) => (
                                <div key={idx} className="border-b border-slate-200/60 last:border-0 pb-4 last:pb-0">
                                    <h4 className="font-bold text-slate-800 mb-1.5 flex items-center text-sm"><CheckCircle size={14} className="mr-2 text-blue-500" />{info.title}</h4>
                                    <p className="text-sm text-slate-600 leading-relaxed pl-6">{info.content}</p>
                                </div>
                            ))}
                        </div>
                    </AccordionItem>

                    {/* 3. 비상연락망 */}
                    <AccordionItem 
                        title="비상 연락망" 
                        icon={Phone} 
                        isOpen={openSection === 'contacts'} 
                        onToggle={() => toggleSection('contacts')}
                    >
                        <div className="grid gap-3">
                            {travelData.contacts.map((contact, idx) => (
                                <div key={idx} className="bg-white p-3 rounded-lg border border-slate-200 flex flex-col shadow-sm">
                                    <div className="flex justify-between items-center mb-1">
                                        <span className="text-[10px] font-bold text-slate-500 bg-slate-100 px-2 py-0.5 rounded border border-slate-200">{contact.type}</span>
                                    </div>
                                    <div className="flex justify-between items-end">
                                        <span className="text-slate-800 font-bold text-sm">{contact.name}</span>
                                        {contact.phone === "추후 기재" ? (
                                            <span className="text-slate-400 font-mono text-sm tracking-wide font-bold">{contact.phone}</span>
                                        ) : (
                                            <a href={`tel:${contact.phone.replace(/[^0-9+]/g, '')}`} className="text-amber-700 font-mono text-sm tracking-wide font-bold hover:underline">{contact.phone}</a>
                                        )}
                                    </div>
                                </div>
                            ))}
                        </div>
                    </AccordionItem>

                    {/* 4. 간단 여행 회화 */}
                    <AccordionItem 
                        title="간단 여행 회화" 
                        icon={MessageSquare} 
                        isOpen={openSection === 'phrases'} 
                        onToggle={() => toggleSection('phrases')}
                    >
                        <div className="space-y-6">
                            {travelData.phrases.map((section, idx) => {
                                const Icon = section.icon;
                                return (
                                    <div key={idx} className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                                        <div className="bg-slate-100 border-b border-slate-200 px-4 py-2 flex items-center">
                                            <Icon size={14} className="text-slate-600 mr-2" />
                                            <h3 className="font-bold text-slate-700 text-sm">{section.category}</h3>
                                        </div>
                                        <div className="divide-y divide-slate-100">
                                            {section.items.map((item, i) => (
                                                <div key={i} className="p-3 hover:bg-slate-50 transition-colors">
                                                    <p className="text-sm font-bold text-slate-800 mb-1 flex items-start">
                                                        <span className="text-amber-500 mr-2 font-black text-xs mt-0.5">Q.</span>
                                                        {item.ko}
                                                    </p>
                                                    <div className="pl-5 space-y-0.5">
                                                        <p className="text-sm font-medium text-blue-700 font-serif">{item.en}</p>
                                                        <p className="text-[11px] text-slate-400 font-medium">"{item.pron}"</p>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    </AccordionItem>
                </div>
            );
        };

        const TimelineItem = ({ activity, isLast }) => (
          <div className="relative pl-8 pb-8 group">
            {!isLast && <div className="absolute left-[11px] top-2 h-full w-[2px] bg-slate-200 group-hover:bg-amber-200 transition-colors"></div>}
            <div className={`absolute left-0 top-1.5 w-6 h-6 rounded-full border-2 bg-white flex items-center justify-center shadow-sm z-10 transition-colors ${activity.type === 'award' ? 'border-amber-500 bg-amber-50' : 'border-slate-100 group-hover:border-amber-400'}`}>
              <div className={activity.type === 'award' ? 'text-amber-600' : 'text-slate-500'}>
                  {(() => {
                      switch (activity.type) {
                          case 'flight': return <Plane size={16} />;
                          case 'food': return <Utensils size={16} />;
                          case 'transport': return <Bus size={16} />;
                          case 'hotel': return <Hotel size={16} />;
                          case 'sightseeing': return <Camera size={16} />;
                          case 'award': return <Award size={16} />;
                          case 'wine': return <Wine size={16} />;
                          case 'activity': return <Sun size={16} />;
                          case 'ship': return <Ship size={16} />;
                          case 'coffee': return <Coffee size={16} />;
                          default: return <CheckCircle size={16} />;
                      }
                  })()}
              </div>
            </div>
            <div className={`p-4 rounded-xl shadow-[0_2px_8px_rgba(0,0,0,0.04)] border ml-2 transition-transform active:scale-[0.99] ${activity.type === 'award' ? 'bg-gradient-to-br from-amber-50 to-white border-amber-100' : 'bg-white border-slate-100/50'}`}>
              <div className="flex items-center justify-between mb-1">
                <span className="text-amber-600 font-bold text-sm font-mono">{activity.time}</span>
                <span className={`text-[10px] uppercase tracking-wider px-2 py-0.5 rounded-full ${activity.type === 'award' ? 'bg-amber-100 text-amber-700 font-bold' : 'bg-slate-50 text-slate-400'}`}>{activity.type}</span>
              </div>
              <h3 className="text-slate-800 font-semibold text-base mb-1">{activity.title}</h3>
              <p className="text-slate-500 text-sm leading-relaxed">{activity.desc}</p>
            </div>
          </div>
        );

        const HotelDetailCard = ({ hotel }) => (
          <div className="bg-white rounded-2xl shadow-lg border border-slate-100 mb-6 overflow-hidden group">
            <div className="h-48 bg-slate-200 relative overflow-hidden">
              <img src={hotel.image} alt={hotel.name} onError={handleImageError} className="w-full h-full object-cover transition-transform duration-700 group-hover:scale-105" />
              <div className="absolute top-4 right-4 bg-white/90 backdrop-blur-sm text-slate-800 text-xs font-bold px-3 py-1.5 rounded-full shadow-sm">{hotel.sub}</div>
            </div>
            <div className="p-6">
              <h3 className="font-serif text-2xl text-slate-900 mb-2 font-[Playfair Display]">{hotel.name}</h3>
              <div className="flex items-center text-slate-500 text-sm mb-4"><MapPin size={14} className="mr-1 text-amber-600" />{hotel.location || "New Zealand"}</div>
              <p className="text-slate-600 text-sm leading-relaxed mb-4 border-l-2 border-amber-200 pl-3">{hotel.desc}</p>
              <div className="flex flex-wrap gap-2 mb-5">
                {hotel.features.map((feature, i) => <span key={i} className="text-xs bg-slate-50 text-slate-600 px-2 py-1 rounded border border-slate-100">{feature}</span>)}
              </div>
              <div className="flex justify-between items-center text-sm border-t border-slate-100 pt-4">
                <div className="text-slate-500"><span className="block text-xs text-slate-400">체크인</span><span className="font-semibold text-slate-800">{hotel.checkIn}</span></div>
                <div className="text-slate-300">|</div>
                <div className="text-slate-500 text-right"><span className="block text-xs text-slate-400">체크아웃</span><span className="font-semibold text-slate-800">{hotel.checkOut}</span></div>
              </div>
            </div>
          </div>
        );

        const DiningCard = ({ item }) => (
          <div className="bg-white rounded-xl shadow-md border border-slate-100 mb-5 overflow-hidden flex flex-col">
            <div className="h-40 overflow-hidden relative">
              <img src={item.image} alt={item.name} onError={handleImageError} className="w-full h-full object-cover" />
              <div className="absolute bottom-0 left-0 w-full bg-gradient-to-t from-black/70 to-transparent p-4">
                <span className="bg-black/60 backdrop-blur-md text-white border border-white/20 px-2 py-1 rounded-md text-xs font-bold w-fit mb-2 block shadow-sm">{item.day}</span>
                <h3 className="text-white text-lg font-bold leading-none shadow-black drop-shadow-md">{item.name}</h3>
              </div>
            </div>
            <div className="p-5 flex-1 flex flex-col">
              <div className="text-sm font-medium text-slate-500 mb-3 italic">{item.type}</div>
              <p className="text-slate-600 text-sm mb-4 flex-1">{item.desc}</p>
              <div className="bg-slate-50 rounded-lg p-4 border border-slate-100">
                <div className="text-xs text-slate-400 font-bold uppercase mb-2 flex items-center"><Utensils size={12} className="mr-1" /> 키 포인트</div>
                <ul className="text-sm text-slate-700 space-y-1">
                  {item.menu.map((menuItem, i) => <li key={i} className="flex items-start"><span className="mr-2 text-amber-500">•</span>{menuItem}</li>)}
                </ul>
              </div>
            </div>
          </div>
        );

        const SpotCard = ({ spot }) => (
          <div className="relative mb-5 rounded-2xl overflow-hidden shadow-lg h-64 group">
            <img src={spot.image} alt={spot.name} onError={handleImageError} className="absolute inset-0 w-full h-full object-cover transition-transform duration-700 group-hover:scale-110" />
            <div className="absolute inset-0 bg-gradient-to-t from-slate-900 via-slate-900/40 to-transparent opacity-90"></div>
            <div className="absolute top-4 left-4">
              <span className="bg-black/70 backdrop-blur-md text-white text-xs font-bold px-3 py-1 rounded-full border border-white/10 shadow-lg">{spot.tag}</span>
            </div>
            <div className="absolute bottom-0 p-6 text-white">
              <h3 className="text-xl font-bold mb-2">{spot.name}</h3>
              <p className="text-sm text-slate-200 leading-relaxed opacity-90 mb-2">{spot.desc}</p>
              {spot.note && <div className="flex items-center text-xs text-amber-300 font-medium"><Info size={12} className="mr-1" /> {spot.note}</div>}
            </div>
          </div>
        );

        function App() {
            const [step, setStep] = useState('main');
            const [activeTab, setActiveTab] = useState('Schedule');
            const [hasVisited, setHasVisited] = useState(false);
            
            useEffect(() => {
                const visited = localStorage.getItem('hasVisited');
                if (visited) setHasVisited(true);
            }, []);

            useEffect(() => {
                if (step === 'main') window.scrollTo({ top: 0, behavior: 'smooth' });
            }, [activeTab]); 

            const handleEnterClick = () => setStep('letter');
            const handleLetterClose = () => { localStorage.setItem('hasVisited', 'true'); setStep('main'); };
            const handleSkip = () => { localStorage.setItem('hasVisited', 'true'); setStep('main'); };

            return (
                <div className="min-h-screen font-sans antialiased text-slate-800 pb-20" style={{backgroundColor: step === 'main' ? '#f8fafc' : '#020617'}}>
                    {step === 'intro' && <IntroScreen onEnter={handleEnterClick} onSkip={handleSkip} showSkip={hasVisited} />}
                    {step === 'letter' && <LetterIntro onClose={handleLetterClose} />}
                    
                    {step === 'main' && (
                        <div className="fade-enter block bg-[#f8fafc] min-h-screen relative">
                            <Header data={travelData.meta} />
                            <TabNavigation activeTab={activeTab} setActiveTab={setActiveTab} />
                            
                            <main className="max-w-md sm:max-w-4xl mx-auto px-5 py-6 min-h-[50vh]">
                                {/* 탭 이름 변경 및 통폐합: Checklist -> TravelInfo */}
                                {activeTab === 'TravelInfo' && <TravelInfoView />}
                                {activeTab === 'Schedule' && (
                                    <div className="animate-in fade-in duration-500">
                                        <NoticeFooter /> 
                                        {travelData.itinerary.map((day, idx) => (
                                            <div key={idx} className="mb-8 last:mb-24">
                                                <div className="sticky top-[74px] z-30 bg-[#f8fafc] py-3 mb-4 flex items-center">
                                                    <div className="bg-slate-900 text-white w-12 h-12 flex flex-col items-center justify-center rounded-xl shadow-lg mr-4">
                                                        <span className="text-[10px] font-light opacity-80">DAY</span>
                                                        <span className="text-lg font-bold leading-none">{day.day}</span>
                                                    </div>
                                                    <div>
                                                        <h2 className="text-lg font-bold text-slate-900">{day.date}</h2>
                                                        <p className="text-sm text-slate-500 line-clamp-1">{day.title}</p>
                                                    </div>
                                                </div>
                                                <div className="px-1">
                                                    {day.activities.map((act, i) => <TimelineItem key={i} activity={act} isLast={i === day.activities.length - 1} />)}
                                                </div>
                                            </div>
                                        ))}
                                    </div>
                                )}
                                {activeTab === 'Hotel' && (
                                    <div className="animate-in fade-in slide-in-from-right-4 duration-500">
                                        <NoticeFooter /> 
                                        <h2 className="text-xl font-bold text-slate-900 mb-6 flex items-center font-[Playfair Display]"><BedDouble className="mr-2 text-amber-600" /> 숙소</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                            {travelData.hotels.map(hotel => <HotelDetailCard key={hotel.id} hotel={hotel} />)}
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'Dining' && (
                                    <div className="animate-in fade-in slide-in-from-right-4 duration-500">
                                        <NoticeFooter /> 
                                        <h2 className="text-xl font-bold text-slate-900 mb-6 flex items-center font-[Playfair Display]"><UtensilsCrossed className="mr-2 text-amber-600" /> 식사</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                            {travelData.dining.map((item, idx) => <DiningCard key={idx} item={item} />)}
                                        </div>
                                    </div>
                                )}
                                {activeTab === 'Attractions' && (
                                    <div className="animate-in fade-in slide-in-from-right-4 duration-500">
                                        <NoticeFooter /> 
                                        <h2 className="text-xl font-bold text-slate-900 mb-6 flex items-center font-[Playfair Display]"><Mountain className="mr-2 text-amber-600" /> 관광</h2>
                                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-6">
                                            {travelData.spots.map((spot, idx) => <SpotCard key={idx} spot={spot} />)}
                                        </div>
                                    </div>
                                )}
                            </main>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
